known_map_scenarios:
  tb3_world:
    world: worlds/01_tb3_world.world
    map: maps/01_tb3_world.yaml
    baseline_params: config/nav2_params_baseline.yaml
    nav2_params: config/nav2_params_module_c.yaml
    launch_gazebo: ros2 launch module_c_nav_teaching 01_gazebo_world.launch.py world:=01_tb3_world.world x_pose:=-2.0 y_pose:=-0.5
    launch_nav2: ros2 launch module_c_nav_teaching 02_nav2_known_map.launch.py map:=01_tb3_world.yaml
    teaching_point: Official TurtleBot3 known-map navigation baseline.

  open_obstacles:
    world: worlds/02_open_obstacles.world
    map: maps/02_open_obstacles.yaml
    baseline_params: config/nav2_params_baseline.yaml
    nav2_params: config/nav2_params_module_c.yaml
    launch_gazebo: ros2 launch module_c_nav_teaching 01_gazebo_world.launch.py world:=02_open_obstacles.world x_pose:=0.0 y_pose:=0.0
    launch_nav2: ros2 launch module_c_nav_teaching 02_nav2_known_map.launch.py map:=02_open_obstacles.yaml
    teaching_point: Costmap and planner behavior around visible obstacles.

  narrow_door:
    world: worlds/03_narrow_door.world
    map: maps/03_narrow_door.yaml
    baseline_params: config/nav2_params_baseline.yaml
    nav2_params: config/nav2_params_module_c.yaml
    launch_gazebo: ros2 launch module_c_nav_teaching 01_gazebo_world.launch.py world:=03_narrow_door.world x_pose:=-3.3 y_pose:=0.0
    launch_nav2: ros2 launch module_c_nav_teaching 02_nav2_known_map.launch.py map:=03_narrow_door.yaml
    teaching_point: Inflation radius, robot radius, and narrow-passage tuning.

slam_scenarios:
  local_room:
    world: worlds/04_local_room_slam.world
    map: generated by slam_toolbox
    nav2_params: config/nav2_params_module_c.yaml
    launch_gazebo: ros2 launch module_c_nav_teaching 01_gazebo_world.launch.py world:=04_local_room_slam.world x_pose:=0.0 y_pose:=0.0
    launch_slam: ros2 launch module_c_nav_teaching 03_slam_mapping.launch.py
    teaching_point: Local unknown-map room practice; students build and save the map.

  dqn_stage1:
    world: worlds/05_tb3_dqn_stage1_slam.world
    map: generated by slam_toolbox
    nav2_params: config/nav2_params_module_c.yaml
    launch_gazebo: ros2 launch module_c_nav_teaching 01_gazebo_world.launch.py world:=05_tb3_dqn_stage1_slam.world x_pose:=0.0 y_pose:=0.0
    launch_slam: ros2 launch module_c_nav_teaching 03_slam_mapping.launch.py
    teaching_point: Small unknown-map scene for SLAM and obstacle observation.
